name: Release npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Test
        run: go test ./...

      - name: Build npm binaries
        run: node scripts/build-npm.mjs

      - name: Prepare npm packages
        run: node scripts/prepare-npm-packages.mjs

      - name: Dry-run npm packs
        run: |
          npm pack --dry-run
          npm pack --dry-run ./npm/linux-x64
          npm pack --dry-run ./npm/linux-arm64
          npm pack --dry-run ./npm/darwin-x64
          npm pack --dry-run ./npm/darwin-arm64

      - name: Publish to npm
        run: node scripts/publish-npm.mjs

      - name: Verify npm version
        run: |
          version="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5; do
            published="$(npm view @ninj4dkill4/octx version 2>/dev/null || true)"
            if [ "$published" = "$version" ]; then
              exit 0
            fi
            echo "npm latest is ${published:-unavailable}, want $version; retry $attempt/5"
            sleep 10
          done
          echo "npm latest did not become $version"
          exit 1

      - name: Smoke test npm install
        run: |
          version="${GITHUB_REF_NAME#v}"
          tmp="$(mktemp -d)"
          for attempt in 1 2 3 4 5; do
            if npm install -g --prefix "$tmp" --include=optional "@ninj4dkill4/octx@$version"; then
              break
            fi
            echo "npm install failed; retry $attempt/5"
            sleep 10
          done
          "$tmp/bin/octx" --help
          installed="$("$tmp/bin/octx" version)"
          if [ "$installed" != "$version" ]; then
            echo "installed octx version $installed, want $version"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists"
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
